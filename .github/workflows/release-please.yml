name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  release_please:
    name: release-please
    runs-on: ubuntu-latest
    outputs:
      releaseCreated: ${{ steps.release.outputs.release_created }}
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          config-file: .github/release-please/config.json
          manifest-file: .github/release-please/manifest.json

  npm_publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: release_please
    if: needs.release_please.outputs.releaseCreated == 'true'
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          show-progress: false
      - uses: actions/setup-node@v6
        with:
          cache: npm
          node-version: 24
          registry-url: "https://registry.npmjs.org"
      - run: npm ci --no-audit --fund=false --include=dev
      - run: npm publish --provenance --access public
