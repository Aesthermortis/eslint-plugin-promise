version: 2

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "sunday"
      time: "03:00"
    open-pull-requests-limit: 1
    labels: ["dependencies", "ci"]
    commit-message:
      prefix: "ci"
      include: "scope"
    pull-request-branch-name:
      separator: "-"
    groups:
      github-actions:
        update-types: ["minor", "patch"]
        patterns: ["*"]
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "sunday"
      time: "03:30"
    open-pull-requests-limit: 2
    labels: ["dependencies", "npm"]
    commit-message:
      prefix: "build"
      prefix-development: "build"
      include: "scope"
    pull-request-branch-name:
      separator: "-"
    groups:
      eslint:
        update-types: ["minor", "patch"]
        patterns:
          [
            "eslint*",
            "@eslint/*",
            "eslint-plugin-*",
            "eslint-config-*",
            "@types/eslint-plugin-security",
          ]
      test:
        update-types: ["minor", "patch"]
        patterns: ["jest*", "@types/jest"]
      build:
        update-types: ["minor", "patch"]
        patterns: ["@rollup/*", "rollup*", "typescript"]
      commit-hooks:
        update-types: ["minor", "patch"]
        patterns: ["husky", "lint-staged", "@commitlint/*"]
      format:
        update-types: ["minor", "patch"]
        patterns: ["prettier", "prettier-plugin-packagejson", "@homer0/prettier-plugin-jsdoc"]
      runtime:
        update-types: ["minor", "patch"]
        patterns: ["@eslint-community/eslint-utils"]
      misc:
        update-types: ["minor", "patch"]
        patterns: ["globals", "@types/node"]
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
